<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SARANG | 日本語</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg">

  <header class="topbar">
    <a class="back" href="index.html" aria-label="戻る">

    </a>
  </header>

  <main class="shell">
    <section class="profile">
      <div class="logo-card">
        <img src="sarang.png" alt="SARANG Logo">

      <h1 class="title">SARANG（サラン）</h1>
      <p class="bio">
        日本と韓国をつなぐ、新しいオフラインマッチングイベント。<br/>

      <p class="micro">
        「福岡で開催される日韓オフライン紹介イベント」等の案内投稿あり
      </p>
    </section>

    <section class="links">
      <!-- 🔧 下のリンクは実際のリンクに差し替えてOK -->
      <a class="btn primary" href="https://www.instagram.com/sarang.matching.kr/" target="_blank" rel="noopener">
        📩 Instagram（DM）
      </a>

    <section class="notice">
      <h2 class="h2">ご案内</h2>

        <li>最新情報はInstagramの投稿/DMでご案内します。</li>

      </ul>

    <footer class="footer">
      <p>© SARANG. All rights reserved.</p>
